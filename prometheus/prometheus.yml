global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api-observability-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:3000
        labels:
          service: api-observability-platform
          environment: local
